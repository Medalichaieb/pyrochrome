name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Lint, types & tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check src tests

      - name: Black (format check)
        run: uv run black --check src tests

      - name: Mypy (types)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

  # NOTE: the web (Vite + TS) job is intentionally omitted while the frontend is
  # just a scaffold (no package-lock.json yet). Re-add it once `npm install` has
  # produced a lockfile — see the commented template in the PR / git history.
